services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    command: tritonserver --model-repository=/models --log-verbose=0
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./serving/model_repository:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  fastapi:
    build: .
    ports:
      - "8081:8000"
    environment:
      - TRITON_URL=triton:8000
    depends_on:
      triton:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./serving/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - triton
      - fastapi

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./serving/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./serving/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
